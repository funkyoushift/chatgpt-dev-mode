name: Deploy MCP Helper to Fly

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only --app funkyou-dev-helper
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
